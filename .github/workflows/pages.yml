name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prepare release identity
        run: |
          short_sha="${GITHUB_SHA::7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "VITE_RELEASE_ID=gh-${short_sha}" >> "$GITHUB_ENV"
          echo "VITE_GIT_SHA=${short_sha}" >> "$GITHUB_ENV"
          echo "VITE_DEPLOYMENT_ID=pages-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=${build_time}" >> "$GITHUB_ENV"
          echo "VITE_ASSET_BASE_PATH=/ChunkSkew/" >> "$GITHUB_ENV"
          echo "VITE_STATIC_DEMO=1" >> "$GITHUB_ENV"
      - run: pnpm build
      - run: cp dist/index.html dist/404.html
      - run: node scripts/create-pages-spa-routes.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
